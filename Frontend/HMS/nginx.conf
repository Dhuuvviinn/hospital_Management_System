server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Fixes the 'Refresh' issue by redirecting all routes to React
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Ensure this matches the container name in your docker-compose.yml
        proxy_pass http://hms-backend-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Optional: If you have media files (like doctor profile photos)
    location /media/ {
        alias /usr/share/nginx/media/;
    }
}
